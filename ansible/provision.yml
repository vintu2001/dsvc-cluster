---
# provision.yml — Baseline provisioning playbook.
# Idempotent: safe to run multiple times on the same hosts.
#
# What it does:
#   1. Hardens the node (swap off, kernel params for storage)
#   2. Installs Docker
#   3. Configures data directories with correct permissions
#   4. Copies and starts the DSVC systemd service
#
# Usage:
#   ansible-playbook -i ansible/inventory.yml ansible/provision.yml

- name: Provision DSVC storage nodes
  hosts: dsvc_cluster
  become: true
  gather_facts: true

  vars:
    dsvc_service_name: dsvc-node
    dsvc_user: dsvc
    dsvc_group: dsvc

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

  tasks:
    # ── System tuning for storage workloads ──────────────────────────────────

    - name: Disable swap (required for consistent I/O latency)
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Ensure swap is disabled on reboot
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s)'
        replace: '#\1'

    - name: Set kernel parameters for high-throughput storage
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: vm.swappiness,             value: "1" }
        - { key: net.core.rmem_max,         value: "134217728" }
        - { key: net.core.wmem_max,         value: "134217728" }
        - { key: net.ipv4.tcp_rmem,         value: "4096 87380 134217728" }
        - { key: net.ipv4.tcp_wmem,         value: "4096 65536 134217728" }
        - { key: fs.file-max,               value: "2097152" }

    # ── Docker installation ──────────────────────────────────────────────────

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
        state: present

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: >
          deb [arch=amd64]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present

    - name: Install Docker CE
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    - name: Ensure Docker is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    # ── DSVC user and data directory ─────────────────────────────────────────

    - name: Create dsvc system user
      ansible.builtin.user:
        name: "{{ dsvc_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ dsvc_data_dir }}"
        create_home: false

    - name: Create data directory with correct permissions
      ansible.builtin.file:
        path: "{{ dsvc_data_dir }}"
        state: directory
        owner: "{{ dsvc_user }}"
        group: "{{ dsvc_group }}"
        mode: "0750"

    # ── Pull DSVC Docker image ───────────────────────────────────────────────

    - name: Pull the DSVC node image
      community.docker.docker_image:
        name: "{{ dsvc_image }}"
        source: pull
      ignore_errors: true   # skip if running locally without a registry

    # ── Systemd service for DSVC container ──────────────────────────────────

    - name: Deploy systemd service file for DSVC node
      ansible.builtin.template:
        src: templates/dsvc-node.service.j2
        dest: /etc/systemd/system/{{ dsvc_service_name }}.service
        owner: root
        group: root
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start DSVC service
      ansible.builtin.service:
        name: "{{ dsvc_service_name }}"
        state: started
        enabled: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
