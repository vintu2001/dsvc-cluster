---
# HorizontalPodAutoscaler scales the StatefulSet based on CPU.
# Note: StatefulSet scaling with Raft requires careful ring re-balancing.
# Set minReplicas ≥ 3 to always maintain a Raft quorum.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dsvc-hpa
  namespace: dsvc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: dsvc-node
  minReplicas: 3
  maxReplicas: 9
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
